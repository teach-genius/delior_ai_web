{% load static %}
<style>
    #loader {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
        background: rgba(10, 15, 30, 0.55);
        backdrop-filter: blur(3px);
        display: none;
        justify-content: center;
        align-items: center;
        z-index: 9999;
        padding: 20px; /* Marge de sécurité sur mobile */
        box-sizing: border-box;
    }

    #anim-loader {
        width: 250px;
        height: 250px;
        max-width: 80vw; /* Limite à 80% de la largeur de l'écran */
        max-height: 80vw; /* Limite à 80% de la hauteur pour garder le ratio */
        display: flex;
        align-items: center;
        justify-content: center;
    }

    #anim-loader svg {
        background: transparent;
        max-width: 100%;
        max-height: 100%;
        width: auto;
        height: auto;
    }

    /* Ajustement spécifique pour les très petits écrans */
    @media (max-width: 480px) {
        #anim-loader {
            width: 180px;
            height: 180px;
        }
    }
</style>

<div id="loader">
    <div id="anim-loader"></div>
</div>

<script>
    var animation = lottie.loadAnimation({
        container: document.getElementById('anim-loader'),
        renderer: 'svg',
        loop: true,
        autoplay: true,
        path: "{% static 'animations/Loadin_Files.json' %}"
    });

    window.addEventListener("load", function () {
        document.getElementById("loader").style.display = "none";
    });

    function showLoader() {
        document.getElementById("loader").style.display = "flex";
    }
</script>
